# Maven package Java project Web App to Linux on Azure
# Build your Java project and deploy it to Azure as a Linux web app
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

pr:
- main

variables:
  azureSubscription: 'd51dc818-d1e2-4a90-9be0-4ba6711a7d9a'
  webAppName: 'GR02-ISWD622-26A'
  environmentName: 'GR02-ISWD622-26A'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: MavenPackageAndPublishArtifacts
    displayName: Maven Package and Publish Artifacts
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: SonarQubePrepare@5
      displayName: 'Prepare SonarQube Analysis'
      inputs:
        SonarQube: 'SonarQube'
        scannerMode: 'Other'
        extraProperties: |
          sonar.jacoco.reportPaths=$(System.DefaultWorkingDirectory)/target/site/jacoco/jacoco.xml
          sonar.java.coveragePlugin=jacoco

    - task: Maven@4
      displayName: 'Maven Package'
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: 'clean package'

    - task: SonarQubeAnalyze@5
      displayName: 'Run SonarQube Analysis'
      inputs:
        SonarQube: 'SonarQube'

    # 📊 Publicar resultados de cobertura JaCoCo
    - task: PublishCodeCoverageResults@1
      displayName: 'Publish Code Coverage Results'
      inputs:
        codeCoverageTool: 'JaCoCo'
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/target/site/jacoco/jacoco.xml'
        reportDirectory: '$(System.DefaultWorkingDirectory)/target/site/jacoco'
        failIfCoverageEmpty: true

    - task: CopyFiles@2
      displayName: 'Copy Files to artifact staging directory'
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/target'
        Contents: '*.war'
        TargetFolder: $(Build.ArtifactStagingDirectory)

    - bash: |
        cd $(Build.ArtifactStagingDirectory)
        mv GR02-ISWD622-26A.war ROOT.war 2>/dev/null || mv *.war ROOT.war
        ls -lh
      displayName: 'Rename WAR to ROOT'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifact: drop'
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)
        artifactName: drop
